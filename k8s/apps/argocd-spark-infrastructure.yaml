apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spark-infrastructure
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: spark-workflow
spec:
  project: default
  source:
    repoURL: https://github.com/RobertinoSolanas/spark-workflow-main.git
    targetRevision: HEAD
    path: k8s/infrastructure/base
    kustomize:
      namespace: spark-workflow
  destination:
    server: https://kubernetes.default.svc
    namespace: spark-workflow
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
