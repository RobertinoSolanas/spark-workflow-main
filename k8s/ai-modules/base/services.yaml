apiVersion: apps/v1
kind: Deployment
metadata:
  name: extraction-module
  namespace: spark-workflow
  labels:
    app: extraction-module
    component: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: extraction-module
  template:
    metadata:
      labels:
        app: extraction-module
        component: ai
    spec:
      containers:
        - name: extraction
          image: spark-ai-extraction:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: ai-modules-config
            - secretRef:
                name: postgresql-secrets
          env:
            - name: DMS_BASE_URL
              value: "http://document-management-service:8000"
            - name: TEMPORAL_SERVER_URL
              value: "temporal:7233"
            - name: TEMPORAL_S3_ENDPOINT_URL
              value: "http://minio:9000"
            - name: QDRANT_BASE_URL
              value: "http://qdrant:6333"
            - name: OTEL_ENDPOINT
              value: "http://otel-collector:4317"
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
