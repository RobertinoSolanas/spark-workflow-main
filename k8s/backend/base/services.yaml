apiVersion: apps/v1
kind: Deployment
metadata:
  name: comment-service
  namespace: spark-workflow
  labels:
    app: comment-service
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: comment-service
  template:
    metadata:
      labels:
        app: comment-service
        component: backend
    spec:
      containers:
        - name: comment-service
          image: spark-backend-comment-service:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: postgresql-secrets
          env:
            - name: DB_HOST
              value: "postgresql"
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: comment-service
  namespace: spark-workflow
  labels:
    app: comment-service
    component: backend
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  selector:
    app: comment-service
---
