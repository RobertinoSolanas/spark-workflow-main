apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-orchestration-service
  namespace: spark-workflow
  labels:
    app: agent-orchestration-service
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-orchestration-service
  template:
    metadata:
      labels:
        app: agent-orchestration-service
        component: backend
    spec:
      containers:
        - name: agent-orchestrator
          image: spark-backend-agent-orchestration-service:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: postgresql-secrets
          env:
            - name: TEMPORAL_HOST
              value: "temporal:7233"
            - name: API_DMS_BASE_URL
              value: "http://document-management-service:8000"
            - name: API_FVP_BASE_URL
              value: "http://formal-completeness-check:8000"
            - name: API_PLAUSIBILITY_NOTES_BASE_URL
              value: "http://plausibility-notes:8000"
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
