apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: spark-workflow
bases:
  - ../base
patches:
  - path: replica-patch.yaml
  - path: resource-patch.yaml
configMapGenerator:
  - name: backend-config
    behavior: merge
    literals:
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
