apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Namespace for all resources
namespace: spark-workflow

# Reference all services under base directory
resources:
  # Infrastructure services
  - base/01-infrastructure/postgresql-deployment.yaml
  - base/01-infrastructure/elasticsearch-deployment.yaml
  - base/01-infrastructure/minio-deployment.yaml
  - base/01-infrastructure/qdrant-deployment.yaml
  - base/01-infrastructure/temporal-deployment.yaml

  # Backend application services
  - base/02-applications/backend-deployments.yaml

  # Workflow modules
  - base/03-modules/modul-deployments.yaml

  # Shared services
  - base/04-shared-services/shared-services-deployments.yaml

  # Observability stack
  - base/05-observability/observability-deployments.yaml

  # Secrets
  - base/06-secrets/secrets.yaml

  # External access (NodePort services)
  - base/07-external-access/external-services.yaml

# Image overrides for local MicroK8s containerd (imported via 'microk8s images import')
# Images are built with podman and imported directly into MicroK8s containerd
# Use 'scripts/build_local_images.sh' to build and import all images
images:
  - name: spark-workflow/temporal-codec-service
    newName: spark-workflow/temporal-codec-service
    newTag: latest
  - name: spark-workflow/document-management-service
    newName: spark-workflow/document-management-service
    newTag: latest
  - name: spark-workflow/agent-orchestration-service
    newName: spark-workflow/agent-orchestration-service
    newTag: latest
  - name: spark-workflow/formal-completeness-check
    newName: spark-workflow/formal-completeness-check
    newTag: latest
  - name: spark-workflow/plausibility-notes
    newName: spark-workflow/plausibility-notes
    newTag: latest
  - name: spark-workflow/project-logic-service
    newName: spark-workflow/project-logic-service
    newTag: latest
  - name: spark-workflow/modul-inhaltsextraktion
    newName: spark-workflow/modul-inhaltsextraktion
    newTag: latest
  - name: spark-workflow/modul-formale-pruefung
    newName: spark-workflow/modul-formale-pruefung
    newTag: latest
  - name: spark-workflow/modul-plausibilitaet-pruefung
    newName: spark-workflow/modul-plausibilitaet-pruefung
    newTag: latest
  - name: spark-workflow/litellm-proxy
    newName: spark-workflow/litellm-proxy
    newTag: latest
  - name: spark-workflow/unoserver
    newName: spark-workflow/unoserver
    newTag: latest

# Labels for all resources
labels:
  - pairs:
      app.kubernetes.io/part-of: spark-workflow
      app.kubernetes.io/managed-by: kustomize
      deployment-environment: local
  - includeSelectors: false

# Set imagePullPolicy to IfNotPresent for all deployments
# This is needed for locally imported images in MicroK8s
patches:
  - target:
      kind: Deployment
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
