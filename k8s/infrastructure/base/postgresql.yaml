apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-config
  namespace: spark-workflow
data:
  POSTGRES_DB: "postgres"
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "spark-workflow-dev"
  DB_PASSWORD: "spark-workflow-dev"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-secrets
  namespace: spark-workflow
type: Opaque
stringData:
  POSTGRES_PASSWORD: "spark-workflow-dev"
  S3_ACCESS_KEY_ID: "spark-workflow-dev"
  S3_SECRET_ACCESS_KEY: "spark-workflow-dev"
  TEMPORAL_S3_ACCESS_KEY_ID: "spark-workflow-dev"
  TEMPORAL_S3_SECRET_ACCESS_KEY: "spark-workflow-dev"
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: spark-workflow
  labels:
    app: postgresql
    component: infrastructure
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app: postgresql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: spark-workflow
  labels:
    app: postgresql
    component: infrastructure
spec:
  serviceName: postgresql
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
        component: infrastructure
    spec:
      containers:
        - name: postgresql
          image: postgres:16.10
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: postgresql-config
            - secretRef:
                name: postgresql-secrets
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
              name: postgres
              protocol: TCP
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: init-sql
          configMap:
            name: postgresql-init
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-init
  namespace: spark-workflow
data:
  init.sql: |
    CREATE DATABASE temporal;
    CREATE DATABASE dms;
    CREATE DATABASE comment_service_db;
    CREATE DATABASE formal_completeness_check;
    CREATE DATABASE plausibility_notes;
    CREATE DATABASE project_logic;
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: spark-workflow
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
