# Temporal Codec Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-codec-service
  namespace: spark-workflow
  labels:
    app: temporal-codec-service
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-codec-service
  template:
    metadata:
      labels:
        app: temporal-codec-service
    spec:
      containers:
        - name: temporal-codec-service
          image: spark-workflow/temporal-codec-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: TEMPORAL_S3_ENDPOINT_URL
              value: http://minio:9000
            - name: TEMPORAL_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: spark-workflow-secrets
                  key: temporal-s3-access-key-id
            - name: TEMPORAL_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: spark-workflow-secrets
                  key: temporal-s3-secret-access-key
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-codec-service
  namespace: spark-workflow
  labels:
    app: temporal-codec-service
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: temporal-codec-service
---
