# Modul Inhaltsextraktion
apiVersion: apps/v1
kind: Deployment
metadata:
  name: modul-inhaltsextraktion
  namespace: spark-workflow
  labels:
    app: modul-inhaltsextraktion
    component: modul
spec:
  replicas: 1
  selector:
    matchLabels:
      app: modul-inhaltsextraktion
  template:
    metadata:
      labels:
        app: modul-inhaltsextraktion
    spec:
      containers:
        - name: modul-inhaltsextraktion
          image: spark-workflow/modul-inhaltsextraktion:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DMS_BASE_URL
              value: http://document-management-service:8000
            - name: DOCLING_HOST
              value: docling-serve
            - name: TEMPORAL_SERVER_URL
              value: temporal:7233
            - name: TEMPORAL_S3_ENDPOINT_URL
              value: http://minio:9000
            - name: UNO_HOST
              value: unoserver
            - name: QDRANT_BASE_URL
              value: http://qdrant:6333
            - name: OTEL_ENDPOINT
              value: http://otel-collector:4317
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: spark-workflow-secrets
                  key: s3-access-key-id
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: spark-workflow-secrets
                  key: s3-secret-access-key
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 15
---
