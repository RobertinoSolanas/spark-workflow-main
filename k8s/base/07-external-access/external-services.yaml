# NodePort Services for external access
# NodePort range: 30000-32767 (MicroK8s standard)
---
# PostgreSQL - External access (if needed)
apiVersion: v1
kind: Service
metadata:
  name: postgresql-external
  namespace: spark-workflow
  labels:
    app: postgresql
spec:
  type: NodePort
  ports:
    - port: 5432
      targetPort: 5432
      nodePort: 30432
      protocol: TCP
      name: postgresql
  selector:
    app: postgresql
---
# MinIO API - External access
apiVersion: v1
kind: Service
metadata:
  name: minio-external
  namespace: spark-workflow
  labels:
    app: minio
spec:
  type: NodePort
  ports:
    - port: 9000
      targetPort: 9000
      nodePort: 30900
      protocol: TCP
      name: api
    - port: 9001
      targetPort: 9001
      nodePort: 30901
      protocol: TCP
      name: console
  selector:
    app: minio
---
