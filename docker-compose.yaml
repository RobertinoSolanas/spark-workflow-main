# Shared platform services for local development
# Usage: docker compose up -d
services:
  # Temporal dependencies
  elasticsearch:
    image: elasticsearch:7.17.27
    restart: unless-stopped
    environment:
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=512mb
      - cluster.routing.allocation.disk.watermark.high=256mb
      - cluster.routing.allocation.disk.watermark.flood_stage=128mb
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false
      - ingest.geoip.downloader.enabled=false

  postgresql:
    image: postgres:16.10
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Run ./scripts/create_secrets.sh to generate .env}
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    configs:
      - source: postgresql_init_sql
        target: /docker-entrypoint-initdb.d/init.sql

  # Temporal workflow engine
  temporal:
    image: temporalio/auto-setup:1.29.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:7233:7233"
    volumes:
      - ./docker/temporal/development-sql.yaml:/etc/temporal/config/dynamicconfig/development-sql.yaml
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=${DB_PASSWORD:?Run ./scripts/create_secrets.sh to generate .env}
      - POSTGRES_SEEDS=postgresql
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
      - ENABLE_ES=true
      - ES_SEEDS=elasticsearch
      - ES_VERSION=v7
      # Below needs to bind to 0.0.0.0 so it
      # works when connected to a VPN :)
      - BIND_ON_IP=0.0.0.0
      - TEMPORAL_ADDRESS=0.0.0.0:7233
      - TEMPORAL_CLI_ADDRESS=0.0.0.0:7233
    depends_on:
      - postgresql
      - elasticsearch
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "h"]
      interval: 1s
      timeout: 5s
      retries: 30

  temporal-admin-tools:
    image: temporalio/admin-tools:1.29
    restart: unless-stopped
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    depends_on:
      - temporal
    stdin_open: true
    tty: true

  temporal-init:
    image: temporalio/admin-tools:1.29
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        # Ripped out from auto-setup.sh of auto-setup image
        until temporal operator cluster health --address temporal:7233 | grep -q SERVING; do
          echo "Waiting for Temporal server to start..."
          sleep 1
        done
        echo "Temporal server started."

        until temporal operator search-attribute list --address temporal:7233 --namespace default >/dev/null 2>&1; do
          echo "Waiting for namespace cache to refresh..."
          sleep 1
        done
        echo "Namespace cache refreshed."

        temporal operator search-attribute create --address temporal:7233 --namespace default --name ProjectId --type Keyword
        echo "Search attribute ProjectId registered."
        temporal operator namespace update --namespace default --retention 60d

  temporal-ui:
    image: temporalio/ui:2.44.1
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233

  codec:
    build:
      context: .
      dockerfile: 02-backend/temporal_codec_service/Dockerfile
    env_file:
      - 02-backend/temporal_codec_service/.env.local
      - .env
    environment:
      TEMPORAL_S3_ENDPOINT_URL: "http://minio:9000"
    ports:
      - "127.0.0.1:8005:8000"
    depends_on:
      - minio
    restart: unless-stopped

  # MinIO S3-compatible storage for Temporal large payloads
  minio:
    image: minio/minio
    restart: unless-stopped
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:?Run ./scripts/create_secrets.sh to generate .env}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:?Run ./scripts/create_secrets.sh to generate .env}
    command: server /data --console-address ":9001"

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    environment:
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      TEMPORAL_S3_ACCESS_KEY_ID: ${TEMPORAL_S3_ACCESS_KEY_ID}
      TEMPORAL_S3_SECRET_ACCESS_KEY: ${TEMPORAL_S3_SECRET_ACCESS_KEY}
    entrypoint: >
      /bin/sh -c '
      until mc alias set local http://minio:9000 $$S3_ACCESS_KEY_ID $$S3_SECRET_ACCESS_KEY; do sleep 1; done;
      mc mb -p local/dms-local || true;
      mc mb -p local/temporal-payloads || true;
      mc admin user svcacct add local $$S3_ACCESS_KEY_ID --access-key "$$S3_ACCESS_KEY_ID" --secret-key "$$S3_SECRET_ACCESS_KEY" || true;
      mc admin user svcacct add local $$S3_ACCESS_KEY_ID --access-key "$$TEMPORAL_S3_ACCESS_KEY_ID" --secret-key "$$TEMPORAL_S3_SECRET_ACCESS_KEY" || true;
      '

  # Qdrant vector database
  qdrant:
    image: qdrant/qdrant:v1.17.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  # Observability Stack
  tempo:
    image: grafana/tempo:2.9.0
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./docker/observability/tempo.yaml:/etc/tempo.yaml
    ports:
      - "127.0.0.1:3200:3200" # Tempo HTTP API

  loki:
    image: grafana/loki:3.6.3
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "127.0.0.1:3100:3100"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.142.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./docker/observability/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    environment:
      - TEMPORAL_UI_HOST=http://temporal-ui:8080
    ports:
      - "127.0.0.1:4317:4317" # OTLP gRPC
      - "127.0.0.1:4318:4318" # OTLP HTTP
    depends_on:
      - tempo
      - loki

  prometheus:
    image: prom/prometheus:v3.4.2
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
    volumes:
      - ./docker/observability/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
    ports:
      - "127.0.0.1:9090:9090"

  grafana:
    image: grafana/grafana-oss:11.2.0
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./docker/observability/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docker/observability/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - tempo
      - loki
      - prometheus

configs:
  postgresql_init_sql:
    content: |
      CREATE DATABASE temporal;
      CREATE DATABASE dms;
      CREATE DATABASE comment_service_db;
      CREATE DATABASE formal_completeness_check;
      CREATE DATABASE plausibility_notes;
      CREATE DATABASE project_logic;

networks:
  default:
    name: stack
