    genericName: SPARK Workflow
    shortDescription: Die KI-Module aus dem Projekt SPARK unterstützen komplexe Planungs- und Genehmigungsverfahren in der öffentlichen Verwaltung.
    longDescription: |-
      ## Projektzielsetzung und Kernfunktionalitäten

      Im Projekt SPARK hat das Bundesministerium für Digitales und Staatsmodernisierung in den vergangenen neun Monaten KI‑Module in einer Innovationspartnerschaft entwickeln lassen. Diese KI‑Module unterstützen komplexe verwaltungsrechtliche Planungs- und Genehmigungsverfahren als operative Assistenz. Die Entwicklung wurde aus dem Klima- und Transformationsfonds des Bundesministeriums für Wirtschaft und Energie finanziert. Die KI trägt dazu bei, Verwaltungsverfahren zu beschleunigen und Beschäftigte in der öffentlichen Verwaltung bei zeitaufwändigen Tätigkeiten wirksam zu entlasten. Die Lösung ist verfahrens- und rechtsgebietsagnostisch angelegt, sodass eine breite Nachnutzbarkeit in den Verfahren von Bund, Ländern und Kommunen möglich ist. Gleichzeitig können die KI‑Module auch für andere Aufgaben jenseits von Planungs- und Genehmigungsverfahren eingesetzt werden.

      Planungs- und Genehmigungsverfahren gelten als ein zentraler Flaschenhals für den Erhalt und Ausbau von Infrastruktur in Deutschland. Die zugrunde liegenden Verwaltungsverfahren sind regelmäßig komplex sowie ressourcen- und zeitintensiv. SPARK unterstützt die Mitarbeitenden in den Behörden durch einen Workflow, der sich an ihrer juristischen Arbeitsweise orientiert, sowie durch KI‑Module, die ihnen initiale Prüf- und Bewertungsvorschläge unterbreiten. Die Nutzenden treffen stets die Entscheidungen im Prüfprozess. KI‑Vorschläge können übernommen, ergänzt oder vollständig verworfen werden.

      Entstanden sind mehrere Module und Services, die wesentliche Verfahrensschritte abbilden. Dazu gehören insbesondere die Inhaltsextraktion des Sachverhalts aus Antragsunterlagen, die formale und materielle Vollständigkeitsprüfung einschließlich der Plausibilitätsprüfung, die Behörden- und Öffentlichkeitsbeteiligung, die rechtliche Prüfung und Bewertung sowie die Beschlusserstellung. Ergänzt wird die KI‑Lösung durch eine digitale Rechtsdogmatik mit Gesetzesdatenbanken, automatisierter Normendekonstruktion und juristischen Bewertungsmechanismen.

      ## Projektstand und Open-Source-Veröffentlichung

      SPARK wird in mehreren Releases als Open Source veröffentlicht. Die Lösung befindet sich derzeit im Beta‑Status.

      Die erste Veröffentlichung umfasst die Module Inhaltsextraktion und formale Vollständigkeitsprüfung einschließlich der Plausibilitätsprüfung sowie unterstützende Backend‑Dienste. Weitere Funktionen werden in den nachfolgenden Open‑Source‑Veröffentlichungen ergänzt.

      Eine detaillierte Übersicht über Inhalte und Zeitpunkte der drei Releases befindet sich in der Datei [`roadmap.md`](https://gitlab.opencode.de/bmds/planungs-und-genehmigungsbeschleunigung/spark-workflow/-/blob/main/docs/roadmap.md).
