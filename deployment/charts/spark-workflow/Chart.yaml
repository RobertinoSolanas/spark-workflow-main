type: application
version: 1.0.0
appVersion: "1.0.0"
dependencies:
  - name: spark-infra
    version: 1.0.0
    repository: "file://./spark-infra"
  - name: spark-backend
    version: 1.0.0
    repository: "file://./spark-backend"
  - name: spark-ai-modules
    version: 1.0.0
    repository: "file://./spark-ai-modules"
  - name: spark-shared
    version: 1.0.0
    repository: "file://./spark-shared"
